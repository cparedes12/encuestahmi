name: Build & Release APK

# Se dispara al publicar un tag de versión, ej:  git tag v1.0.1 && git push --tags
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {} # permite lanzarlo manualmente desde la pestaña Actions

permissions:
  contents: write # necesario para crear el Release

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.3'
          channel: stable
          cache: true

      - name: Dependencias
        run: flutter pub get

      - name: Restaurar keystore de firma
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Compilar APK release
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=ADMIN_PIN=${{ secrets.ADMIN_PIN }}

      - name: Subir APK a Supabase Storage (bucket privado) y registrar versión
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          set -e
          VER="${GITHUB_REF_NAME#v}"                       # v1.0.1 -> 1.0.1
          FILE="encuesta-salida-${VER}.apk"
          APK="build/app/outputs/flutter-apk/app-release.apk"
          echo "Subiendo $FILE a bucket app-releases..."
          curl -sS -f -X POST \
            "${SUPABASE_URL}/storage/v1/object/app-releases/${FILE}" \
            -H "Authorization: Bearer ${SERVICE_KEY}" \
            -H "apikey: ${SERVICE_KEY}" \
            -H "x-upsert: true" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary "@${APK}"
          echo "Registrando versión ${VER} en app_release..."
          curl -sS -f -X POST \
            "${SUPABASE_URL}/rest/v1/app_release" \
            -H "Authorization: Bearer ${SERVICE_KEY}" \
            -H "apikey: ${SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"version\":\"${VER}\",\"storage_path\":\"${FILE}\",\"notas\":\"Release ${GITHUB_REF_NAME}\",\"activo\":true}"
          echo "✅ Publicado ${FILE}"
