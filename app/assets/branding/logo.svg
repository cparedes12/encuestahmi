  <!-- Base / rosca del foco -->
  <g fill="#ffffff">
    <rect x="430" y="664" width="164" height="34" rx="17"/>
    <rect x="448" y="712" width="128" height="34" rx="17"/>
    <rect x="474" y="760" width="76" height="34" rx="17"/>
